name: CLI E2E

on:
  push:
  pull_request:

jobs:
  cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable AArch64 containers
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Bootstrap pinned Flutter and Pluto
        run: ./tools/setup/setup.sh
      - name: Export setup-managed tools
        run: |
          FLUTTER_VERSION="$(tr -d '[:space:]' < tools/pluto/pins/flutter.version)"
          echo "$HOME/.pluto/bin" >> "$GITHUB_PATH"
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          echo "$HOME/.pluto/sdk/$FLUTTER_VERSION/bin" >> "$GITHUB_PATH"
      - name: Verify fresh-clone artifacts and setup
        run: |
          ./tools/setup/setup.sh --verify
          ./tools/setup/test/setup_test.sh
      - name: Analyze and test the CLI
        working-directory: tools/pluto
        run: |
          dart analyze --fatal-infos .
          dart test
      - name: Build release and profile AOT smoke apps
        run: ./ci/aot-smoke.sh
